@if (!telegram.isInTelegram && !telegram.forceApp) {
  <app-open-from-bot />
} @else {
  <div class="shell">
    <main class="content">
      <router-outlet />
    </main>
    <nav class="bottom-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" queryParamsHandling="preserve">Карта</a>
      <a routerLink="/events" routerLinkActive="active" queryParamsHandling="preserve">Сходки</a>
      <a routerLink="/tg-groups" routerLinkActive="active" queryParamsHandling="preserve">ТГ группы</a>
      <a routerLink="/my-tickets" routerLinkActive="active" queryParamsHandling="preserve">Мои планы</a>
      <a routerLink="/create-event" routerLinkActive="active" queryParamsHandling="preserve">Создать</a>
      <a routerLink="/profile" routerLinkActive="active" queryParamsHandling="preserve">Профиль</a>
    </nav>
  </div>
}
