@if (!telegram.isInTelegram && !telegram.forceApp) {
  <app-open-from-bot />
} @else {
  <div class="shell">
    <main class="content">
      <router-outlet />
    </main>
    <nav class="bottom-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Карта</a>
      <a routerLink="/events" routerLinkActive="active">Мероприятия</a>
      <a routerLink="/my-tickets" routerLinkActive="active">Билеты</a>
      <a routerLink="/create-event" routerLinkActive="active">Создать</a>
      <a routerLink="/profile" routerLinkActive="active">Профиль</a>
    </nav>
  </div>
}
